            { question: "В каком году город Акмола был официально переименован в Астану?", correct: "1998 г." },
            { question: "Какое крупное спортивное зимнее событие Азиатского континента совместно приняли города Астана и Алматы в 2011 году?", correct: "Зимние Азиатские игры (Азиада)" },
            { question: "Какую международную специализированную выставку, посвященную энергии будущего, принял Казахстан (город Астана) в 2017 году?", correct: "Экспо-2017" },
            { question: "Международный финансовый центр, начавший свою официальную работу в столице Казахстана в 2018 году:", correct: "МФЦА (AIFC)" },
            { question: "Какое событие произошло на политической арене Казахстана 19 марта 2019 года?", correct: "Первый Президент Н. Назарбаев заявил о досрочном сложении своих полномочий" },
            { question: "Кто стал вторым Президентом Республики Казахстан по итогам внеочередных выборов в июне 2019 года?", correct: "Касым-Жомарт Токаев" },
            { question: "Трагические январские события в Казахстане («Канды кантар») произошли в:", correct: "2022 г." },
            { question: "В июне 2022 года в Казахстане состоялся республиканский референдум по вопросу:", correct: "Принятия поправок в Конституцию РК, направленных на политическую модернизацию" },
            { question: "Согласно поправкам в Конституцию, принятым в сентябре 2022 года, Президент Казахстана избирается на срок:", correct: "Один срок продолжительностью 7 лет без права переизбрания" },
            { question: "По инициативе Президента К. Токаева общенациональный консультативный орган, сменивший Национальный совет общественного доверия, называется:", correct: "Национальный курултай" },
            { question: "Какое историческое название получил праздник 25 октября, восстановленный в статусе Национального праздника в 2022 году?", correct: "День Республики" },
            { question: "Какой день отмечается в Казахстане 31 мая в память о жертвах сталинских репрессий и голода?", correct: "День памяти жертв политических репрессий и голода" }
        ];

        let currentTab = 'past'; // Текущая активная вкладка

        const searchInput = document.getElementById("search");
        const resultsBox = document.getElementById("results");
        const counterBox = document.getElementById("counter");

        // Функция переключения вкладок
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Меняем активный класс у кнопок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Подсвечиваем нужную кнопку
            if(tabName === 'past') {
                document.querySelector("button[onclick=\"switchTab('past')\"]").classList.add('active');
            } else {
                document.querySelector("button[onclick=\"switchTab('new')\"]").classList.add('active');
            }
            
            // Сбрасываем строку поиска при переключении вкладки (по желанию можно убрать)
            searchInput.value = '';
            
            render();
        }

        function render() {
            const query = searchInput.value.toLowerCase().trim();
            
            // Выбираем базу данных в зависимости от вкладки
            const activeDb = (currentTab === 'past') ? pastDatabase : newDatabase;
            
            const filtered = activeDb.filter(item => {
                return item.question.toLowerCase().includes(query);
            });

            counterBox.textContent = `Найдено: ${filtered.length}`;
            
            if (!filtered.length) {
                resultsBox.innerHTML = '<div class="empty">Ничего не найдено</div>';
                return;
            }

            resultsBox.innerHTML = filtered.map(item => {
                return `
                    <article class="card">
                        <div class="question">${escapeHtml(item.question)}</div>
                        <div class="answer"><strong>Ответ:</strong> ${escapeHtml(item.correct)}</div>
                    </article>
                `;
            }).join("");
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        searchInput.addEventListener("input", render);
        render(); // Первичное отображение
    </script>
</body>
</html>
